name: tests
on:
  push:
    branches: [main, "spec/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libcairo2 libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (bare-except ban + standard lints)
        run: ruff check .

      - name: Unit + integration + migration tests
        env:
          REDIS_HOST: localhost
        run: pytest tests/unit tests/integration tests/migration -v --tb=short

# ── e2e-dvwa removed ──────────────────────────────────────────────────
# The end-to-end DVWA scan needs Ollama with qwen3:14b (~9 GB model) running,
# which default GitHub Actions runners (~7 GB RAM) cannot host. Run it locally
# before demos:
#
#   docker compose up -d            # DVWA on :8080
#   ollama serve &                   # qwen3:14b must be pulled
#   DVWA_AVAILABLE=1 OLLAMA_AVAILABLE=1 \
#       ./venv/bin/pytest tests/e2e -v -m e2e
#
# To re-enable in CI later (e.g. on a larger self-hosted runner with Ollama
# pre-installed), restore an e2e-dvwa job here and export both env vars.
