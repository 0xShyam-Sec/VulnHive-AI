name: tests
on:
  push:
    branches: [main, "spec/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libcairo2 libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (bare-except ban + standard lints)
        run: ruff check .

      - name: Unit + integration + migration tests
        env:
          REDIS_HOST: localhost
        run: pytest tests/unit tests/integration tests/migration -v --tb=short

  e2e-dvwa:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      dvwa:
        image: vulnerables/web-dvwa
        ports: ["8080:80"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.14" }

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libcairo2 libharfbuzz0b
          python -m pip install -r requirements.txt

      - name: Wait for DVWA
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/login.php > /dev/null; then
              echo "DVWA up"; exit 0
            fi
            sleep 3
          done
          echo "DVWA did not come up"; exit 1

      - name: Run e2e smoke
        env:
          DVWA_AVAILABLE: "1"
        run: pytest tests/e2e -v -m e2e
