[tool.ruff]
target-version = "py310"
line-length = 110
extend-exclude = [
    "venv",
    "venv.bak-py39-mixed",
    "__pycache__",
    "dashboard_v1_backup",
    "reports",
    "tests/legacy",
]

[tool.ruff.lint]
select = [
    "E", "F", "W",    # pycodestyle + pyflakes
    "B",              # bugbear
    "S110", "S112",   # bare except / except-pass — the bug we are eliminating
]
ignore = [
    "E501",           # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]
"agents/orchestrator.py" = ["F401", "F841", "E"]
"agents/base.py"   = ["F841", "E"]
"pipeline.py"      = ["F841", "F541", "E"]
"auth.py"          = ["S110", "S112", "F841", "F401", "F541", "F601", "E", "B"]
"dashboard/db.py"  = ["S110", "S112", "F841", "F401", "F541", "F601", "E", "B"]
"engine/scan_state.py" = ["S110", "S112", "F841", "F401", "F541", "F601", "E", "B"]
